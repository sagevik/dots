# Monitors - Uncomment this and set your monitor if on vm
# monitorrule=Virtial-1,0.55,1,tile,0,1,0,0,1920,1080,60
# Heavily Inspired by Argos Nothing's DWM Re-write + Fun stuff.
# Check his out here: https://github.com/argosnothing/mango-dwm-config/

# Environment
env=WMENU_COLORS,-S f3b37c -s 000000 -N 000000 -n b3b3b3 -m 000000 -M f3b37c

# Start with mango
exec-once=waybar -c ~/.config/mango/config.jsonc -s ~/.config/mango/style.css >/dev/null 2>&1 &
exec-once=swaybg -i ~/pix/wallpapers/.current -m fill >/dev/null 2>&1 &
exec-once=swaync &
exec-once=nm-applet &
exec-once=blueman-applet &
exec-once=xrdb -merge /home/rs/.Xresourses &
exec-once=/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 &
exec-once=foot --server &

# waybar & wmenu required.
bind=Super,Escape,spawn,/home/rs/.config/mango/scripts/powermenu.sh
bind=SUPER,Return,spawn,foot
bind=SUPER,p,spawn,/home/rs/.config/mango/scripts/menu.sh
bind=SUPER,s,spawn,/home/rs/.config/mango/scripts/snip.sh
bind=SUPER,b,spawn,/home/rs/.config/mango/scripts/rebar.sh
bind=SUPER,space,spawn,rofi -show combi
bind=SUPER+CTRL,space,spawn,rofi -show run
bind=SUPER+SHIFT,space,spawn,/home/rs/.config/mango/scripts/rofi.sh

bind=SUPER+SHIFT,Return,zoom

# Displays
bind=SUPER+ALT+CTRL,p,spawn,/home/rs/.config/mango/scripts/displays.sh

# Screenshot
bind=none,Print,spawn,/home/rs/.config/mango/scripts/snip.sh selection
bind=SUPER,Print,spawn,/home/rs/.config/mango/scripts/snip.sh screen
bind=CTRL,Print,spawn,/home/rs/.config/mango/scripts/snip.sh clipboard

# Switch view/tags
bind=SUPER,1,comboview,1
bind=SUPER,2,comboview,2
bind=SUPER,3,comboview,3
bind=SUPER,4,comboview,4
bind=SUPER,5,comboview,5
bind=SUPER,6,comboview,6
bind=SUPER,7,comboview,7
bind=SUPER,8,comboview,8
bind=SUPER,9,comboview,9

# Move to tag
bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5
bind=SUPER+SHIFT,6,tag,6
bind=SUPER+SHIFT,7,tag,7
bind=SUPER+SHIFT,8,tag,8
bind=SUPER+SHIFT,9,tag,9

# Move to tag silent
bind=ALT,1,tagsilent,1
bind=ALT,2,tagsilent,2
bind=ALT,3,tagsilent,3
bind=ALT,4,tagsilent,4
bind=ALT,5,tagsilent,5
bind=ALT,6,tagsilent,6
bind=ALT,7,tagsilent,7
bind=ALT,8,tagsilent,8
bind=ALT,9,tagsilent,9

# Toggle tag on window
bind=SUPER+CTRL,1,toggletag,1
bind=SUPER+CTRL,2,toggletag,2
bind=SUPER+CTRL,3,toggletag,3
bind=SUPER+CTRL,4,toggletag,4
bind=SUPER+CTRL,5,toggletag,5
bind=SUPER+CTRL,6,toggletag,6
bind=SUPER+CTRL,7,toggletag,7
bind=SUPER+CTRL,8,toggletag,8
bind=SUPER+CTRL,9,toggletag,9

# Resize focused window
bind = SUPER+SHIFT,h,resizewin,-50,0
bind = SUPER+SHIFT,j,resizewin,0,+50
bind = SUPER+SHIFT,k,resizewin,0,-50
bind = SUPER+SHIFT,l,resizewin,+50,0

bind=SUPER,i,incnmaster,+1
bind=SUPER+SHIFT,i,incnmaster,-1
bind=SUPER,q,killclient
bind=SUPER+SHIFT,r,reload_config

bind=SUPER,comma,focusmon,left
bind=SUPER,period,focusmon,right
bind=SUPER+CTRL,comma,tagmon,left
bind=SUPER+CTRL,period,tagmon,right

# Layouts
bind=SUPER,t,setlayout,tile
bind=SUPER+SHIFT,t,setlayout,vertical_tile
bind=SUPER+CTRL,t,setlayout,right_tile
bind=SUPER+CTRL+SHIFT,t,setlayout,vertical_grid
bind=SUPER,m,setlayout,monocle
bind=SUPER+SHIFT,m,setlayout,center_tile
bind=SUPER+CTRL,m,setlayout,scroller
bind=SUPER+CTRL+SHIFT,m,setlayout,vertical_scroller
bind=SUPER,n,switch_layout
bind=SUPER,a,togglegaps

bind=SUPER+SHIFT,f,togglefullscreen,
bind=SUPER,f,togglefloating,

bind=SUPER,r,switch_proportion_preset
bind=SUPER,F1,set_proportion,1.0
bind=SUPER,F2,set_proportion,0.5
bind=SUPER,F3,set_proportion,0.33
bind=SUPER,F4,set_proportion,0.25
# bind=SUPER+ALT,r,set_proportion,0.33
# bind=SHIFT+ALT,r,set_proportion,0.66

# Layouts in mango are per tag. So we'll set all tags to tile by default. 
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile


gappih=2
gappiv=2
gappoh=2
gappov=2
borderpx=2
border_radius=0
no_border_when_single=1
focuscolor=0xf3b37cff

# Mouse Button Bindings
mouse_natural_scrolling=1
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# Keyboard
xkb_rules_layout=no
xkb_rules_options=caps:escape
repeat_rate=35
repeat_delay=200

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=1
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# Effect
blur=0
shadows = 0

# Animation Configuration
animations=0

# Layout Settings
drag_tile_to_tile=1

# Scroller
scroller_structs=5
scroller_default_proportion=0.5
scroller_focus_center=0
scroller_prefer_center=1
edge_scroller_pointer_focus=1
scroller_default_proportion_single=0.66
scroller_proportion_preset=0.25,0.33,0.5,0.66,0.75,1.0

# Center Tile
center_master_overspread=1
center_when_single_slave=1

# Tile
new_is_master=1
default_mfact=0.55
default_nmaster=1
default_smfact=0.5

bind=SUPER,c,centerwin
bind=SUPER+SHIFT,c,centerwin

# smartmovewin
bind=CTRL+SHIFT,k,smartmovewin,up
bind=CTRL+SHIFT,j,smartmovewin,down
bind=CTRL+SHIFT,h,smartmovewin,left
bind=CTRL+SHIFT,l,smartmovewin,right

# smartresize
bind=ALT+CTRL+SHIFT,k,smartresizewin,up
bind=ALT+CTRL+SHIFT,j,smartresizewin,down
bind=ALT+CTRL+SHIFT,h,smartresizewin,left
bind=ALT+CTRL+SHIFT,l,smartresizewin,right

# switch window focus
bind=SUPER,j,focusstack,next
bind=SUPER,k,focusstack,prev
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right

# swap window
bind=SUPER+CTRL,k,exchange_client,up
bind=SUPER+CTRL,j,exchange_client,down
bind=SUPER+CTRL,h,exchange_client,left
bind=SUPER+CTRL,l,exchange_client,right

# Gesturebind
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down
gesturebind=none,left,4,viewtoleft_have_client
gesturebind=none,right,4,viewtoright_have_client
gesturebind=none,up,4,toggleoverview
gesturebind=none,down,4,toggleoverview
bind=SUPER,o,toggleoverview

# Audio
bind=none,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%+
bind=none,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-
bind=none,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Mic
bind=SUPER,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 1%+
bind=SUPER,XF86AudioLowerVolume, exec,wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 1%-
bind=none,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=SUPER,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Screen brightness
bind=none,XF86MonBrightnessUp,spawn,brightness up
bind=none,XF86MonBrightnessDown,spawn,brightness down
bind=SUPER,XF86MonBrightnessDown, exec, brightness setbrightness

# Scratchpads
single_scratchpad=0
scratchpadcolor=f3b37cff
# Named Scratchpads
# toggle_named_scratchpad,[appid],[title],[cmd]
bind=SUPER+SHIFT,A,toggle_named_scratchpad,Bitwarden,none,bitwarden-desktop
windowrule=isnamedscratchpad:1,width:1000,height:800,appid:Bitwarden

bind=SUPER+SHIFT,S,toggle_named_scratchpad,scratchs,none,foot -a scratchs
windowrule=isnamedscratchpad:1,width:950,height:750,appid:scratchs

bind=SUPER+SHIFT,D,toggle_named_scratchpad,scratchd,none,foot -a scratchd -T dd_foot
windowrule=isnamedscratchpad:1,width:1280,height:800,appid:scratchd

# put a window in scratchpad link
bind=SUPER+CTRL,u,minimized,

# Go through all the bookmarks
bind=SUPER+SHIFT,U,toggle_scratchpad

# move out a window from scratchpad link
# you can also you togglefloating move out
bind=SUPER+ALT,u,restore_minimized
