set -a terminal-features "tmux-256color:RGB"
# set prefix key
set-option -g prefix C-b

# set session, window and pane indexes to start at 1
set -g base-index 1
set -g pane-base-index 1

# pass Alt+C to fzf
unbind-key -n M-c
#bind-key -n M-c send-keys M-c

# enable mouse interaction
set-option -g mouse on

# run tmuxsessionizer
bind-key -n C-space run-shell "tmux neww tmuxsessionizer"
bind-key i run-shell "tmux neww cht.sh"

set -g renumber-windows on
set -g mode-keys vi
set -g status-position bottom
set -g status-justify absolute-centre
set -g status-style "fg=#606065,bg=default"
# set -g window-status-current-style "fg=blue bold"
set -g window-status-current-style "fg=#f3be7c"
# set -g window-status-current-style "fg=#f3be7c bold"
set -g message-style "fg=black,bg=#f3b37c"
set -g mode-style "fg=black,bg=#f3b37c"
set -g pane-active-border-style "fg=blue"
set -g pane-border-style "fg=#606065"
set -g status-interval 5
set -g status-right "#h "
set -g status-left " #S"

# vim style panel selection
set-window-option -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# vim style panel resize
bind-key -r C-h resize-pane -L 5
bind-key -r C-j resize-pane -D 5
bind-key -r C-k resize-pane -U 5
bind-key -r C-l resize-pane -R 5

# set scrollback history
set-option -g history-limit 100000

# use current path for new windows and panes
bind-key c new-window -c "#{pane_current_path}"
bind-key '"' split-window -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"

# reload tmux
bind-key C-F12 source ~/.config/tmux/tmux.conf


